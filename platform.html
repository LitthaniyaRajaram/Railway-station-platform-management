<!DOCTYPE html>
<html>
<head>
<title>Smart Platform Arrival Dashboard</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: url('https://images.unsplash.com/photo-1474487548417-781cb71495f3') no-repeat center center fixed;
    background-size: cover;
}

.overlay {
    background: rgba(0,0,0,0.85);
    min-height: 100vh;
    padding: 20px;
    color: white;
}

.header-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

h1 {
    color: #4fc3f7;
}

.search-box input {
    padding: 8px;
    width: 250px;
    border-radius: 5px;
    border: none;
}

.clock {
    margin-top: 5px;
    font-weight: bold;
}

.train-container {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 20px;
    margin-top: 20px;
}

.train-card {
    background-color: rgba(255,255,255,0.1);
    padding: 15px;
    border-radius: 10px;
    backdrop-filter: blur(5px);
    transition: 0.3s;
}

.train-card:hover {
    transform: scale(1.03);
}

.top-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.platform {
    font-weight: bold;
    color: yellow;
}

.status {
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 13px;
}

.green { background: green; }
.yellow { background: goldenrod; }
.red { background: crimson; }

.middle-row {
    margin-top: 10px;
    font-size: 14px;
}

.bottom-row {
    margin-top: 10px;
    font-size: 14px;
}

.countdown {
    margin-top: 5px;
    font-weight: bold;
}

button {
    margin-top: 8px;
    padding: 5px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.notify { background: #38bdf8; }
.announce { background: #22c55e; }

</style>
</head>

<body>

<div class="overlay">

<div class="header-bar">
    <div>
        <h1>🚆 Smart Platform Dashboard</h1>
        <div class="clock" id="clock"></div>
    </div>

    <div class="search-box">
        <input type="text" id="search" placeholder="Search Train..." onkeyup="filterTrains()">
    </div>
</div>

<div class="train-container" id="trainContainer"></div>

</div>

<script>

let trains = [

{number:"12623", name:"Chennai Express", from:"Chennai", to:"Bangalore", platform:3, arrival:"10:30 AM", departure:"10:45 AM", minutes:5},

{number:"16712", name:"Madurai Mail", from:"Chennai", to:"Madurai", platform:5, arrival:"11:00 AM", departure:"11:20 AM", minutes:15},

{number:"22645", name:"Coimbatore SF", from:"Chennai", to:"Coimbatore", platform:2, arrival:"11:40 AM", departure:"11:55 AM", minutes:35},

{number:"16127", name:"Guruvayur Express", from:"Chennai", to:"Guruvayur", platform:4, arrival:"12:10 PM", departure:"12:25 PM", minutes:8},

{number:"12675", name:"Kovai Intercity", from:"Chennai", to:"Coimbatore", platform:1, arrival:"12:45 PM", departure:"01:00 PM", minutes:3},

{number:"16853", name:"Trichy Passenger", from:"Chennai", to:"Trichy", platform:6, arrival:"01:20 PM", departure:"01:40 PM", minutes:20},

{number:"12652", name:"Tamil Nadu Exp", from:"Chennai", to:"Delhi", platform:7, arrival:"02:00 PM", departure:"02:15 PM", minutes:12},

{number:"16022", name:"Kaveri Express", from:"Chennai", to:"Mysore", platform:8, arrival:"02:30 PM", departure:"02:50 PM", minutes:25},

{number:"22671", name:"Tejas Express", from:"Chennai", to:"Madurai", platform:9, arrival:"03:00 PM", departure:"03:15 PM", minutes:6},

{number:"12696", name:"Thiruvananthapuram Exp", from:"Chennai", to:"Trivandrum", platform:10, arrival:"03:40 PM", departure:"04:00 PM", minutes:40}

];

function updateClock(){
let now = new Date();
document.getElementById("clock").innerHTML = "🕒 " + now.toLocaleTimeString();
}
setInterval(updateClock,1000);
updateClock();

function getStatus(minutes){
if(minutes <= 5) return {text:"Arriving Soon", class:"green"};
if(minutes <= 20) return {text:"On Time", class:"yellow"};
return {text:"Delayed", class:"red"};
}

function renderTrains(){
let container = document.getElementById("trainContainer");
container.innerHTML = "";

trains.forEach(train=>{
let status = getStatus(train.minutes);

container.innerHTML += `
<div class="train-card">

<div class="top-row">
<div>
<b>${train.name}</b> (${train.number})
</div>
<div class="platform">Platform ${train.platform}</div>
<div class="status ${status.class}">${status.text}</div>
</div>

<div class="middle-row">
From: ${train.from} <br>
To: ${train.to}
</div>

<div class="bottom-row">
Arrival: ${train.arrival} <br>
Departure: ${train.departure}
<div class="countdown">Arriving in ${train.minutes} mins</div>
</div>

<button class="notify" onclick="notifyTrain('${train.name}')">Notify</button>
<button class="announce" onclick="announceTrain('${train.name}', ${train.platform})">Announce</button>

</div>
`;
});
}

function filterTrains(){
let search = document.getElementById("search").value.toLowerCase();
let cards = document.getElementsByClassName("train-card");

for(let i=0;i<cards.length;i++){
let text = cards[i].innerText.toLowerCase();
cards[i].style.display = text.includes(search) ? "block" : "none";
}
}

function notifyTrain(name){
alert("🔔 Notification set for " + name);
}

function announceTrain(name, platform){
alert("🔊 Announcement: " + name + " arriving at Platform " + platform);
}

setInterval(()=>{
trains.forEach(train=>{
if(train.minutes > 0) train.minutes--;
});
renderTrains();
},60000);

renderTrains();

</script>

</body>
</html>
