<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login | RailEase</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:url('https://images.unsplash.com/photo-1519999482648-25049ddd37b1') no-repeat center center/cover;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
}

body::before{
    content:"";
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.55);
    z-index:-1;
}

.login-box{
    width:100%;
    max-width:380px;
    background:#fff;
    border-radius:16px;
    padding:30px 25px;
    box-shadow:0 10px 35px rgba(0,0,0,0.4);
    text-align:center;
}

h2{
    color:#0a3d62;
    margin-bottom:10px;
}

p{
    font-size:13px;
    color:#666;
    margin-bottom:20px;
}

.input-group{
    text-align:left;
    margin-bottom:15px;
}

label{
    font-size:13px;
    font-weight:600;
}

input{
    width:100%;
    padding:11px;
    margin-top:5px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    background:#0a3d62;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

button:hover{
    background:#07406d;
}

.bottom{
    margin-top:12px;
    font-size:13px;
}

a{
    color:#0a3d62;
    text-decoration:none;
    font-weight:600;
}

/* ✅ NOTIFICATION POPUP */
.toast{
    position:fixed;
    top:20px;
    right:-300px;
    padding:12px 18px;
    color:white;
    border-radius:8px;
    font-weight:500;
    box-shadow:0 5px 15px rgba(0,0,0,0.3);
    transition:0.4s;
    z-index:9999;
}

.toast.show{
    right:20px;
}

.toast.success{
    background:#22c55e;
}

.toast.error{
    background:#e74c3c;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>🔐 RailEase Login</h2>
    <p>Access Railway Platform System</p>

    <form id="loginForm">

        <div class="input-group">
            <label>Username</label>
            <input type="text" name="username" required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password" name="password" required>
        </div>

        <button type="submit">Login</button>

    </form>

    <div class="bottom">
        New user? <a href="register.html">Register here</a>
    </div>

</div>

<!-- ✅ TOAST -->
<div id="toast" class="toast"></div>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e){
    e.preventDefault();

    let formData = new FormData(this);

    fetch("login.php", {
        method: "POST",
        body: formData
    })
    .then(res => res.text())
    .then(data => {

        let toast = document.getElementById("toast");

        if(data.trim() === "success"){

            toast.innerText = "Login Successful";
            toast.className = "toast show success";

            // redirect after 2 sec
            setTimeout(()=>{
                window.location.href = "book.html";
            }, 2000);

        } else {

            toast.innerText = "Incorrect Password";
            toast.className = "toast show error";

            setTimeout(()=>{
                toast.className = "toast";
            }, 3000);
        }

    });
});
</script>

</body>
</html>
